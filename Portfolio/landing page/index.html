<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Streaming</title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

  <nav class="navbar">
    <div class="logo">StreamFlix</div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Movies</a></li>
      <li><a href="#">TV Shows</a></li>
      <li><a href="#">My List</a></li>
    </ul>

    <div class="nav-right">
      
      <img src="https://via.placeholder.com/30" alt="profile" class="profile">
    </div>

    <div class="menu-toggle">☰</div>
  </nav>


  <section class="hero">
  <div class="hero-content">
    <h1 class="hero-title">The Dark Knight</h1>
    <p class="hero-description">
      Batman faces the Joker, a criminal mastermind who plunges Gotham into chaos.
      A battle between order and anarchy begins.
    </p>

    <div class="hero-buttons">
      <button class="btn play-btn">▶ Play</button>
      <button class="btn info-btn">ℹ More Info</button>
    </div>
  </div>
</section>

<section class="movie-row">
  <h2>Trending Now</h2>

  <div class="row-container">
    <button class="scroll-btn left">&#10094;</button>

    <div class="movie-list">
      <img src="https://via.placeholder.com/200x300" class="movie-card">
      <img src="https://via.placeholder.com/200x300" class="movie-card">
      <img src="https://via.placeholder.com/200x300" class="movie-card">
      <img src="https://via.placeholder.com/200x300" class="movie-card">
      <img src="https://via.placeholder.com/200x300" class="movie-card">
      <img src="https://via.placeholder.com/200x300" class="movie-card">
      <img src="https://via.placeholder.com/200x300" class="movie-card">
    </div>

    <button class="scroll-btn right">&#10095;</button>
  </div>
</section>

  <script src="script.js"></script>
</body>
</html>
