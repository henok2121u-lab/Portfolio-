<body>
 <!-- -----------------------------/////////////// header //////////////////----------------------->
    <!--   header -->   
    <section id="contact-header">
        <div class="contaner">
            <nav>
                <div class="logo"><h1>EARTH</h1></div>
                <ul class="nav-links">
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="#home">About</a></li>
                    <li><a href="#home">Service</a></li>
                    <li><a href="#home">Contacr</a></li>
                </ul>
                <div class="menu-btn"><img src="img/menu.svg" alt=""></div>
            </nav>

            <div class="header-content">
                <h1>CONTACT US</h1>
            </div>
        </div>
    </section>

    <div id="contact-us"  class="contaner">
        <form action="#">
            <h1>Get in Tuch</h1>

            <div class="inputswarpper">
                <input type="text" placeholder="your Name">
                <input type="text" placeholder="Phone Number">
                <input type="email" name="" id="" placeholder="Email">
                <textarea name="message" id="" cols="30" rows="10"></textarea>
                <button class="primery-button">SEND NOW</button>
            </div>
        </form>

        <div class="address">
            <h1>Talk to us</h1>
            <div class="detailswarpper">
                <div class="detail">
                    <img src="img/email.png" alt="">
                    <div class="text">
                        <h6>EMAIL</h6>
                        <p>something@example.com</p>
                    </div>
                </div>
                <div class="detail">
                    <img src="img/phone.png" alt="">
                    <div class="text">
                        <h6>PHONE</h6>
                        <p>+251 9856528</p>
                    </div>
                </div>
                <div class="detail">
                    <img src="img/location.png" alt="">
                    <div class="text">
                        <h6>ADDRESS</h6>
                        <p>2727 ocean road, <br>
                            malibu,CA 90266
                        </p>
                    </div>
                </div>
            </div>

            <div class="followuswrapper">
                <h3>Follow Us</h3>
                <ul class="socialLink">
                    <li><a href=""> <img src="img/facebook.png" alt=""></a></li>
                    <li><a href=""> <img src="img/linkedin.png" alt=""></a></li>
                    <li><a href=""> <img src="img/video.png" alt=""></a></li>
                </ul>
            </div>
        </div>
    
    </div>
